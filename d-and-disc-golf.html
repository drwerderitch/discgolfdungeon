var _hooks = [];
var _cursor = 0;
var _renderFn = null;
var _rootEl = null;
var _dirty = false;

function useState(init) {
  var i = _cursor++;
  if (_hooks[i] === undefined) _hooks[i] = typeof init === 'function' ? init() : init;
  var idx = i; // capture
  function setState(v) {
    var next = typeof v === 'function' ? v(_hooks[idx]) : v;
    if (next !== _hooks[idx]) { _hooks[idx] = next; _scheduleUpdate(); }
  }
  return [_hooks[i], setState];
}

function _scheduleUpdate() {
  if (_dirty) return;
  _dirty = true;
  Promise.resolve().then(function() { _dirty = false; _rerender(); });
}

function _rerender() {
  if (!_renderFn || !_rootEl) return;
  _cursor = 0;
  var vdom = _renderFn();
  _rootEl.innerHTML = '';
  var node = _render(vdom);
  if (node) _rootEl.appendChild(node);
}

function createElement(type, props) {
  var children = [];
  for (var i = 2; i < arguments.length; i++) {
    var c = arguments[i];
    if (Array.isArray(c)) for (var j=0;j<c.length;j++) children.push(c[j]);
    else children.push(c);
  }
  props = props || {};
  if (children.length) props = Object.assign({}, props, {children: children.length===1?children[0]:children});
  return {type:type, props:props};
}

function _render(v) {
  if (v === null || v === undefined || v === false || v === true) return null;
  if (typeof v === 'string' || typeof v === 'number') return document.createTextNode(String(v));
  if (Array.isArray(v)) {
    var f = document.createDocumentFragment();
    for (var i=0;i<v.length;i++) { var n=_render(v[i]); if(n) f.appendChild(n); }
    return f;
  }
  if (typeof v.type === 'function') {
    // For components, we don't reset cursor — each component shares the global hook array
    // This works because our app has one root component with all state at the top
    var result = v.type(v.props);
    return _render(result);
  }
  if (v.type === '__fragment__') {
    var f2 = document.createDocumentFragment();
    var kids = v.props && v.props.children;
    if (kids !== undefined) {
      var arr = Array.isArray(kids) ? kids : [kids];
      for (var i=0;i<arr.length;i++) { var n=_render(arr[i]); if(n) f2.appendChild(n); }
    }
    return f2;
  }
  var el = document.createElement(v.type);
  var props = v.props || {};
  for (var k in props) {
    if (k === 'children' || k === 'key') continue;
    var val = props[k];
    if (k === 'style' && val && typeof val === 'object') { Object.assign(el.style, val); }
    else if (k === 'className') { el.className = val||''; }
    else if (k === 'htmlFor') { el.htmlFor = val; }
    else if (k === 'dangerouslySetInnerHTML') { el.innerHTML = val.__html; }
    else if (k.startsWith('on') && typeof val === 'function') { el.addEventListener(k.slice(2).toLowerCase(), val); }
    else if (k === 'checked' || k === 'disabled' || k === 'selected') { if(val) el.setAttribute(k,''); }
    else if (k === 'value') { el.value = val; }
    else if (val !== null && val !== undefined && val !== false) { try{el.setAttribute(k, val);}catch(e){} }
  }
  var ch = props.children;
  if (ch !== undefined) {
    var arr2 = Array.isArray(ch) ? ch : [ch];
    for (var i=0;i<arr2.length;i++) { var n2=_render(arr2[i]); if(n2) el.appendChild(n2); }
  }
  return el;
}

  createElement: createElement,
  Fragment: '__fragment__',
  useState: useState
};
w.useState = useState;
w.ReactDOM = {
  createRoot: function(container) {
    _rootEl = container;
    return {
      render: function(el) {
        _renderFn = function() { return el.type(el.props); };
        _cursor = 0;
        _rerender();
      }
    };
  }
};
