<script>
const {useState} = React;
var _react = React;

// ── COLORS ──────────────────────────────────────────────────────────────────
const C={
  bg:"#2a1a0e",bgCard:"#0a0a1a",bgCardAlt:"#0f0f28",bgDark:"#050510",bgBrown:"#3a2410",
  border:"#6a5a3a",borderBright:"#c8b060",
  gold:"#f8d030",goldDim:"#b89020",
  red:"#f83800",green:"#00c050",blue:"#48a0f8",cyan:"#00e8d8",
  white:"#f8f8f8",whiteDim:"#b8b8b8",grey:"#888888",greyDim:"#505050",
  purple:"#c060e8",parchment:"#d8c080",teal:"#00c8b0",orange:"#f86820",
};
const bevel=(color="#6a5a3a")=>`inset 2px 2px 0 ${color}cc, inset -2px -2px 0 #00000088`;
const bevelBtn=(color="#c8b060")=>`inset 2px 2px 0 ${color}, inset -2px -2px 0 #00000099, inset -1px -1px 0 #00000055`;
const OL="1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,0 2px 0 #000,0 -1px 0 #000";
const OLH="2px 2px 0 #000,-1px -1px 0 #000,2px -1px 0 #000,-1px 2px 0 #000";
const BF="'Courier New',Courier,monospace";
const TEE={red:C.red,white:C.whiteDim,blue:C.blue};

// ── SKILL TAGS (renamed Physical→Athletics, Combat→Tactics) ─────────────────
const ALL_SKILLS=["Tactics","Social","Stealth","Nature","Arcane","Athletics"];
const SKILL_COLORS={Tactics:C.red,Nature:C.green,Social:C.blue,Stealth:C.purple,Arcane:C.cyan,Athletics:C.orange,Universal:C.gold};

// ── CLASSES ──────────────────────────────────────────────────────────────────
const CLASSES=[
  {name:"Fighter",icon:"⚔️",passive:"Your chosen weapon cannot be taken away by disc restriction conditions. On favored holes or by spending a token, if your next throw is your chosen weapon improve your current lie up to 3 steps outside circle 2.",ptype:"behavioral",skills:["Tactics","Athletics","Stealth"],flavor:"You've thrown this disc ten thousand times. You know exactly what it does.",gear:"Putter + chosen weapon + 1 additional disc (3 total)",color:C.red},
  {name:"Ranger",icon:"🏹",passive:"Once per hole may choose any tee box regardless of earned position.",ptype:"triggered",skills:["Nature","Tactics","Athletics"],flavor:"You know this terrain. You know which disc to reach for.",gear:"Putter + 1 disc",color:C.green},
  {name:"Defender",icon:"🛡️",passive:"May declare 'play to mine' — throws a conservative shot and the party may swap to their lie. Both the Defender and any player who swaps throw from that lie.",ptype:"triggered",skills:["Tactics","Social","Athletics"],flavor:"You put yourself between the party and the danger.",gear:"Putter + 1 disc",color:C.blue},
  {name:"Cleric",icon:"✨",passive:"Grant a teammate advantage on any drive or approach without spending a token. Spending a token extends this to putts.",ptype:"triggered",skills:["Social","Arcane","Nature"],flavor:"You keep the party together when things fall apart.",gear:"Putter + 1 disc",color:C.gold},
  {name:"Rogue",icon:"🗡️",passive:"After everyone has thrown their drive the Rogue may move to any other drive lie on the hole. Both the Rogue and the original thrower play from that spot.",ptype:"triggered",skills:["Stealth","Social","Tactics"],flavor:"You wait, you watch, and you take what's there.",gear:"Putter + 1 disc",color:C.greyDim},
  {name:"Merchant",icon:"💰",passive:"Once per hole after drawing an Adventure card may pay 1gp to redraw it. Active: Spend a token to buy any item or disc at half price at any merchant encounter or at camp.",ptype:"triggered",skills:["Social","Nature","Arcane"],flavor:"Every situation has an angle. You just have to find it.",gear:"Putter + 1 disc",color:C.gold},
  {name:"Wizard",icon:"🔮",passive:"Once per hole, after a drive or approach lands, may move their lie up to 3 steps in any direction before throwing next.",ptype:"triggered",skills:["Arcane","Stealth","Social"],flavor:"You don't move to the disc. You move the disc to you.",gear:"Putter + 1 disc",color:C.purple},
  {name:"Seer",icon:"🔭",passive:"Once per hole may rethrow any drive or approach after seeing the result.",ptype:"triggered",skills:["Arcane","Social","Nature"],flavor:"You have been here before. You will be here again.",gear:"Putter + 1 disc",color:C.teal},
  {name:"Monk",icon:"👊",passive:"Once per hole before your approach declare a landing zone and throw. Play that lie. Throw a second disc from the same spot — land within 10 feet of the first and gain advantage on your putt.",ptype:"triggered",skills:["Athletics","Nature","Arcane"],flavor:"Still mind, still hand. You have thrown this shot before in your mind.",gear:"Putter + 1 disc",color:C.gold},
  {name:"Assassin",icon:"🗡️",passive:"On favored holes, if your approach lands within circle one your putt is automatic — pick up and score. Spend a token to use this on any other hole.",ptype:"triggered",skills:["Tactics","Stealth","Athletics"],flavor:"One clean line. One clean shot. Done.",gear:"Putter + 1 disc",color:C.red},
  {name:"Bard",icon:"🎵",passive:"When you spend a token on yourself, declare one teammate before throwing — they also gain a stored advantage for any single throw this hole at no additional cost.",ptype:"triggered",skills:["Social","Nature","Arcane"],flavor:"Your best moment makes everyone better.",gear:"Putter + 1 disc",color:C.green},
  {name:"Barbarian",icon:"🪓",passive:"Before throwing you may choose to throw from blue tee regardless of your earned position. Par or better from blue tee draws a Boon. On favored holes draw two Boons instead.",ptype:"triggered",skills:["Tactics","Athletics","Social"],flavor:"Glory or nothing. The long road is the only road.",gear:"Putter + 1 disc",color:C.red},
  {name:"Marksman",icon:"🎯",passive:"When you make a putt from outside circle 2 you may attempt it a second time. If the second putt drops the party score improves by 1 for adventure success this hole. On favored holes this also applies to circle 1 putts.",ptype:"triggered",skills:["Tactics","Athletics","Stealth"],flavor:"One more time. Cleaner.",gear:"Putter + extra putter + 1 disc (3 total)",color:C.blue},
  {name:"Dragoon",icon:"🐉",passive:"You may jump putt from anywhere outside circle 1. Finish at par or better with a jump putt and draw a Boon. On favored holes jump putts inside circle 1 are also legal. Spend a token for the same on any other hole.",ptype:"behavioral",skills:["Tactics","Athletics","Nature"],flavor:"You leap. You fall. You score.",gear:"Putter + 1 disc",color:C.purple},
  {name:"Artificer",icon:"🔧",passive:"You start with a putter and three gadget discs — your custom built toolkit. On favored holes or by spending a token you may throw any of your gadget discs freely. Otherwise limit one gadget disc per hole.",ptype:"triggered",skills:["Athletics","Stealth","Arcane"],flavor:"You start with a putter and three gadget discs — your custom built toolkit.",gear:"Putter + 3 gadget discs (4 total)",color:C.cyan},
  {name:"Alchemist",icon:"⚗️",passive:"When you birdie, score par instead and bottle the extra stroke. Uncork at any time to reduce the party score by 1 for adventure success. On favored holes or by spending a token, a par earns one luck drop. Three drops fill the bottle.",ptype:"triggered",skills:["Nature","Arcane","Social"],flavor:"Distiller of luck. Every good moment has potential.",gear:"Putter + 1 disc",color:C.green},
  {name:"Druid",icon:"🌿",passive:"When your disc lands in the rough, trees, or brush you may throw your scramble shot with advantage on favored holes or by spending a token.",ptype:"triggered",skills:["Nature","Arcane","Athletics"],flavor:"The forest is not your enemy. It is your home.",gear:"Putter + 1 disc",color:C.green},
  {name:"Duelist",icon:"🤺",passive:"You may declare a duel on any hole — alternate forehand and backhand on every throw excluding putts. Par or better on a completed duel earns 1gp. On favored holes earn 2gp instead.",ptype:"triggered",skills:["Tactics","Athletics","Stealth"],flavor:"Steel in both hands. Never the same cut twice.",gear:"Putter + 1 disc",color:C.red},
];

const PRESTIGE=[
  {name:"Agent of Chaos",icon:"🎲",passive:"You may only throw discs whose speed rating is a prime number. On prime numbered holes gain advantage on one throw of your choice. Prestige — multiclass only.",color:C.purple},
  {name:"Knight of Balance",icon:"⚖️",passive:"You may only throw discs whose speed rating is an even number. On even numbered holes gain advantage on one throw of your choice. Prestige — multiclass only.",color:C.teal},
];

// ── ADVENTURE CARDS ───────────────────────────────────────────────────────────
// consequenceOnFail / consequenceOnSuccess = card object to queue as next hole's adventure
const ADVENTURE_CARDS=[
  // TIER 1 — NO WRINKLE
  {title:"Open Road",tags:"Universal",flavor:"The path ahead is clear. No wrinkle this hole.",effect:"No wrinkle this hole.",success:"Gain 2gp.",fail:"Nothing."},
  {title:"Clear Skies",tags:"Nature",flavor:"Good conditions. Good ground. A clean hole.",effect:"No wrinkle this hole.",success:"Gain 2gp.",fail:"Nothing."},
  {title:"Study the Maps",tags:"Tactics",flavor:"You take a moment to read the terrain.",effect:"No wrinkle this hole.",success:"Gain 2gp.",fail:"Nothing."},
  {title:"Quiet Corner",tags:"Social",flavor:"A peaceful stretch of trail.",effect:"No wrinkle this hole.",success:"Gain 2gp.",fail:"Nothing."},
  {title:"Solid Ground",tags:"Athletics",flavor:"Firm footing. Good conditions underfoot.",effect:"No wrinkle this hole.",success:"Gain 2gp.",fail:"Nothing."},
  {title:"Dark Quiet",tags:"Stealth",flavor:"The woods are still. Nothing stirs.",effect:"No wrinkle this hole.",success:"Gain 2gp.",fail:"Nothing."},
  {title:"Still Air",tags:"Arcane",flavor:"Something ancient and calm settles over the hole.",effect:"No wrinkle this hole.",success:"Gain 2gp.",fail:"Nothing."},

  // TIER 2 — LIGHT CONSTRAINT
  {title:"Waystation",tags:"Nature",flavor:"A worn campsite at the trail's edge. Someone was here recently.",effect:"No wrinkle during play.",success:"The camp yields supplies. Gain 3gp.",fail:"The camp is empty and cold. Gain 1gp."},
  {title:"The Hermit",tags:"Social",flavor:"An old figure sits watching without expression.",effect:"One player may spend 2gp to draw a Boon before throwing.",success:"The hermit nods. Gain 2gp.",fail:"The hermit shakes his head. Nothing."},
  {title:"The Wager",tags:"Social",flavor:"A stranger offers a bet. Cocky smile. Probably a trap.",effect:"Before throwing any player may wager up to 3gp. Par or better: win double the wager. Bogey or worse: lose the wager.",success:"Gain 2gp.",fail:"Gain 1gp."},
  {title:"The Traveling Merchant",tags:"Social",flavor:"A trader with a full pack, heading the other direction.",effect:"Before throwing any player may buy or sell treasures at face value. Any player may also purchase advantage tokens at 2gp each. No wrinkle during play.",success:"He throws in a bonus. Gain 2gp.",fail:"He packed up quickly. No bonus."},
  {title:"Healing Spring",tags:"Nature",flavor:"A clear pool catches the light strangely. The water here is different.",effect:"No wrinkle during play. If any player's disc lands in water this hole they draw no Peril on a bogey — the spring absorbs the misfortune.",success:"Gain 2gp.",fail:"Gain 1gp."},
  {title:"Dragon Sighted",tags:"Universal",flavor:"A shadow passes over the canopy. Enormous. Gone in seconds.",effect:"No wrinkle this hole — everyone is rattled.",success:"It didn't see you. Gain 2gp.",fail:"It circled back. The party loses 2gp.",consequenceOnFail:{title:"The Dragon Returns",tags:"Universal",flavor:"It came back. It saw you.",effect:"All players throw from blue tee this hole.",success:"You drove it off or fled. Gain 5gp. Everyone narrates their moment.",fail:"It cost you dearly. Lose 4gp. Everyone narrates their moment."}},
  {title:"The Goblin Scout",tags:"Stealth — Nature",flavor:"Small tracks in the mud. Fresh. Heading the same direction you are.",effect:"Before throwing the party chooses their approach: move silently (Stealth) or let the forest mask you (Nature).",success:"You avoided detection. Gain 2gp.",fail:"It reported back.",consequenceOnFail:{title:"Goblin Warband",tags:"Universal",flavor:"They found you. Deal with it however you can.",effect:"All players throw drives with disadvantage.",success:"You handled it. Gain 4gp. Everyone narrates their moment.",fail:"It cost you. Lose 3gp. Everyone narrates their moment."}},
  {title:"Old Bones",tags:"Nature",flavor:"The remains of a campfire. Gear scattered. Someone left in a hurry.",effect:"No wrinkle during play.",success:"You find what they left behind. Draw a Boon.",fail:"You find what came after them.",consequenceOnFail:{title:"What Came After Them",tags:"Universal",flavor:"You found out the hard way.",effect:"All players throw drives with disadvantage.",success:"You survived. Gain 3gp. Everyone narrates their moment.",fail:"Lose 2gp. Everyone narrates their moment."}},
  {title:"The Offering Stone",tags:"Arcane",flavor:"A flat rock at the trailside. Coins and small tokens left by travelers before you.",effect:"Any player may leave 1gp as an offering before throwing. If at least two players offer the party gains two stored advantage tokens regardless of score.",success:"The offering was worthy. Gain those tokens plus 1gp back each.",fail:"The tokens remain. Something noted your generosity."},
  {title:"The Wrong Path",tags:"Arcane",flavor:"Something redirected you here. You didn't choose this route.",effect:"One player chosen by the group draws a Peril card and reads it aloud but does not apply it yet — it activates only if the party fails this hole.",success:"The path corrects itself. Discard the Peril unresolved.",fail:"It was leading you here all along. Apply the Peril now."},
  {title:"The Fairy Ring",tags:"Arcane",flavor:"Something small and bright darts between the trees. It stops. It noticed something.",effect:"If any player is carrying a treasure item that player throws their drive with disadvantage. If nobody is carrying a treasure item: the fairy leads you somewhere lucky — draw a Boon.",success:"Gain 2gp.",fail:"Gain 1gp."},
  {title:"The Ruins",tags:"Arcane",flavor:"Stone walls half standing, something still inside worth having.",effect:"No wrinkle during play.",success:"You search carefully and find something useful. Draw a treasure card.",fail:"Whatever is inside heard you coming.",consequenceOnFail:{title:"Something Awakened",tags:"Universal",flavor:"You disturbed it. Now it follows.",effect:"All approaches this hole are thrown with disadvantage.",success:"You contained it. Gain 3gp. Everyone narrates their moment.",fail:"It won't stop following."}},
  {title:"The Watchers",tags:"Stealth",flavor:"Eyes in the treeline. Not animals. Not friendly.",effect:"To avoid detection each player must choose one disc before the hole begins and use it for every throw including putts.",success:"You passed unseen. Gain 1 XP each.",fail:"They saw you. Nothing — but they know you're here."},
  {title:"The Decoy",tags:"Stealth",flavor:"One player draws attention so the others can slip through.",effect:"Before throwing one player volunteers as the decoy. They must throw their fastest disc. All other players must throw their slowest.",success:"The distraction worked. Gain 3gp.",fail:"It drew the wrong kind of attention. The decoy player loses 2gp."},
  {title:"Through the Shadows",tags:"Stealth",flavor:"The only way through is clean. No crashing through brush, no rattling the trees.",effect:"Any player whose throw hits an obstacle loses 1gp immediately. Any player who lands clean draws a personal Boon at the end of the hole.",success:"Gain 3gp.",fail:"Gain 1gp.",consequenceOnFail:{title:"Detected",tags:"Universal",flavor:"They know exactly where you are now.",effect:"All players throw drives with disadvantage. No Stealth class abilities fire on this hole.",success:"You recovered your position. Gain 2gp. Everyone narrates their moment.",fail:"Lose 2gp. Everyone narrates their moment."}},
  {title:"The Toll Keeper",tags:"Social",flavor:"A heavyset figure blocks the trail. Arms folded. Not moving.",effect:"The party has 30 seconds to agree — pay 2gp or push through. Pay: play normally. Push through: all drives with disadvantage.",success:"Gain 3gp.",fail:"The party chose poorly.",consequenceOnFail:{title:"The Enforcer",tags:"Universal",flavor:"You didn't pay. He sent someone.",effect:"The player with the most gold must spend 3gp or throw this hole with disadvantage on every shot.",success:"You settled the debt. Everyone narrates their moment.",fail:"The debt grows. Lose 2gp each. Everyone narrates their moment."}},
  {title:"The Wounded Traveler",tags:"Social",flavor:"Someone on the trail, badly hurt, asking for help.",effect:"Party votes before throwing: stop to help or press on. Stop: costs this hole's gp reward but draw a Boon immediately. Press on: play normally, no gp reward even on success.",success:"Gain 2gp if you stopped. Nothing if you didn't.",fail:"Gain 1 XP — it weighed on everyone. If you pressed on: next Social hole all throws with disadvantage.",woundedTravelerFailConsequence:true},
  {title:"The Banquet",tags:"Social",flavor:"Word travels fast out here. Someone important is watching tonight.",effect:"Before throwing any player may spend gold to make an impression — 1gp, 2gp, or 3gp each. 0-2gp total: Success earns 3gp back. 3-5gp total: Success earns 6gp back. 6gp or more: Success earns 10gp back and draw a treasure.",success:"See above.",fail:"Lose what you spent.",consequenceOnFail:{title:"Embarrassed at the Table",tags:"Universal",flavor:"Your display was noted. Not favorably.",effect:"The player who spent the most gold on The Banquet throws this hole with disadvantage on all shots.",success:"You recovered with grace. Gain 2gp. Everyone narrates their moment.",fail:"The humiliation lingers. That player draws a personal Peril. Everyone narrates their moment."}},
  {title:"The River Crossing",tags:"Athletics",flavor:"The trail ends at the water. No bridge. No easy way around.",effect:"Before throwing the party chooses: wade through (everyone throws from one tee box lower than earned) or find another way (everyone throws from one tee box higher than earned).",success:"Gain 3gp.",fail:"Gain 1gp."},
  {title:"Steep Climb",tags:"Athletics",flavor:"The tee box is higher than it should be. Your legs know it.",effect:"All players throw from blue tee this hole regardless of earned position.",success:"The view from up here was worth it. Gain 3gp.",fail:"Gain 2 XP — the climb itself was the lesson."},
  {title:"The Guarded Camp",tags:"Social — Stealth",flavor:"Sentries at the perimeter. Two ways in.",effect:"Talk your way past (Social) or slip through unnoticed (Stealth).",success:"Gain 3gp.",fail:"Gain 1 XP each.",consequenceOnFail:{title:"Alarm Raised",tags:"Universal",flavor:"They know someone is here. The whole camp is on alert.",effect:"All players throw from blue tee this hole.",success:"You cleared out before they found you. Gain 3gp. Everyone narrates their moment.",fail:"Lose 2gp. Everyone narrates their moment."}},
  {title:"The Border Crossing",tags:"Social — Stealth",flavor:"Guards checking travelers. Papers or no papers.",effect:"Talk your way through (Social) or find another way around (Stealth).",success:"Gain 3gp.",fail:"Gain 1 XP each."},
  {title:"The Ancient Inscription",tags:"Arcane — Nature",flavor:"Writing on a standing stone. Could be a warning. Could be a blessing.",effect:"Decipher the runes (Arcane) or read the land around it (Nature).",success:"Gain 2gp and draw a Boon.",fail:"You misread it. Lose 2gp.",consequenceOnFail:{title:"Misread Omen",tags:"Universal",flavor:"The inscription wasn't a blessing. It was a warning about you.",effect:"All approaches this hole thrown with disadvantage.",success:"The omen passes. Gain 2gp. Everyone narrates their moment.",fail:"Lose 2gp. Everyone narrates their moment."}},
  {title:"The Wounded Beast",tags:"Nature — Tactics",flavor:"Something large and hurt is blocking the path. Dangerous but maybe not hostile.",effect:"Calm it (Nature) or drive it off together (Tactics).",success:"Calm: Gain 3gp and draw a Boon. Drive off: Gain 2gp.",fail:"It charges.",consequenceOnFail:{title:"The Beast Charges",tags:"Universal",flavor:"It made its decision. Now you make yours.",effect:"Everyone stands their ground — no run ups this hole. All throws must be made from a standstill.",success:"You turned it away. Gain 3gp. Everyone narrates their moment.",fail:"It cost you. Lose 2gp. Everyone narrates their moment."}},
  {title:"The Coded Message",tags:"Arcane — Tactics",flavor:"Someone left information behind. Deliberately hidden.",effect:"Decode the cipher (Arcane) or read the tactical layout (Tactics).",success:"Gain 2gp and bank a free redraw — use it on any Adventure, Boon or Peril card this round.",fail:"The message was a trap. Lose 2gp.",consequenceOnFail:{title:"The Trap Springs",tags:"Universal",flavor:"It was bait. Someone is very pleased with themselves.",effect:"All drives thrown with disadvantage. The player who led the decoding draws a personal Peril.",success:"You fought free. Gain 3gp. Everyone narrates their moment.",fail:"Lose 2gp. Everyone narrates their moment."}},
  {title:"The Locked Gate",tags:"Stealth — Athletics",flavor:"The path forward is blocked. One way or another it opens.",effect:"Pick the lock (Stealth) or break it down (Athletics).",success:"The way is open. Gain 3gp.",fail:"Gain 1 XP each."},
  {title:"The River Ambush",tags:"Tactics — Athletics",flavor:"They're waiting at the crossing. You see them first.",effect:"Flank them (Tactics) — everyone throws from one tee box higher than earned. Charge through (Athletics) — everyone throws from blue tee.",success:"Gain 3gp.",fail:"Gain 1 XP each."},

  // TIER 3 — TOUGH CONSTRAINT
  {title:"The Ambush",tags:"Tactics",flavor:"They had the high ground. They planned this.",effect:"The two players with the worst scores last hole throw their drives with disadvantage.",success:"You fought through. Gain 3gp.",fail:"Gain 1 XP each.",consequenceOnFail:{title:"Second Wave",tags:"Universal",flavor:"They regrouped. There are more of them.",effect:"All players throw from blue tee with disadvantage on approaches.",success:"You broke them. Gain 5gp. Everyone narrates their moment.",fail:"Lose 3gp. Everyone narrates their moment."}},
  {title:"Coordinated Attack",tags:"Universal",flavor:"The party moves as one. No hesitation, no scouting each other's results.",effect:"All throws this hole are simultaneous. Count down from three, everyone throws together. No throw may wait for another to land first.",success:"Gain 3gp.",fail:"Gain 1 XP each."},
  {title:"Storm Threatening",tags:"Nature",flavor:"The sky has gone the wrong color. The wind is picking up.",effect:"All putts this hole must be made twice consecutively to count. Miss the second and add a stroke.",success:"The storm passes. Gain 3gp.",fail:"Gain 1 XP each."},
  {title:"The Challenge",tags:"Universal",flavor:"A warrior on the trail. He wants to test the party's best fighter.",effect:"One player volunteers before throwing begins. Declare stakes — Standard: par or better. Heroic: birdie or better.",success:"Standard: Gain 3gp. Heroic: Gain 5gp and draw a Boon.",fail:"Your friends bail you out. Draw your Peril from the bogey as normal."},
  {title:"Plunder",tags:"Universal",flavor:"The monster is down but the treasure is still guarded.",effect:"After all players have holed out each may step back after each make and putt again. Miss and your run ends. Gain 1gp for each made putt.",success:"Gain a bonus 2gp on top of whatever you plundered.",fail:"Whatever you plundered is yours to keep regardless."},
  {title:"The Cursed Lie",tags:"Arcane",flavor:"Something about this spot feels wrong. The ground, the air, the light.",effect:"One player volunteers before throwing begins. That player throws their approach twice and plays the worse lie.",success:"They make par anyway. Gain a stored advantage token and 2 XP.",fail:"Gain 1 XP each."},
  {title:"Sniper's Perch",tags:"Stealth",flavor:"You've found the perfect position. Don't move from it.",effect:"All throws this hole must be made from a standstill. No run ups, no shuffle steps, no movement before release.",success:"Gain 3gp.",fail:"Gain 1 XP each."},
  {title:"Battle Formation",tags:"Tactics",flavor:"The party agrees on an approach before anyone throws.",effect:"Choose forehand or backhand — every throw this hole excluding putts must use that grip. No switching.",success:"Gain 3gp.",fail:"Gain 1 XP each."},
  {title:"Forced March",tags:"Tactics",flavor:"No time to think.",effect:"Every player must throw within 10 seconds of the previous player for the entire hole. No waiting, no deliberating.",success:"Gain 3gp.",fail:"Gain 1 XP each."},

// ── PROFICIENCY HELPER ────────────────────────────────────────────────────────
function getProficientPlayers(card, questPlayers) {
  if (!card || !card.tags) return [];
  const cardTags = card.tags.split(/[—,\-]/).map(s=>s.trim()).filter(Boolean);
  const isUniversal = cardTags.some(t=>t==="Universal");
  if (isUniversal) return questPlayers.map(p=>p.id);
  return questPlayers
    .filter(p => p.chosenSkills && p.chosenSkills.some(s => cardTags.includes(s)))
    .map(p=>p.id);
}

// ── SKILL TAG DISPLAY ─────────────────────────────────────────────────────────
function SkillTags({tags}) {
  if (!tags) return null;
  const SKILL_SET = new Set([...ALL_SKILLS, "Universal"]);
  const parts = tags.split(/[—,\-]/).map(s=>s.trim()).filter(s=>SKILL_SET.has(s));
  if (!parts.length) return null;
  return React.createElement('div',{style:{display:"flex",gap:"3px",flexShrink:0,marginLeft:6,flexWrap:"wrap",justifyContent:"flex-end"}},
    parts.map((t,i)=>React.createElement('span',{key:i,style:{display:"inline-block",padding:"1px 6px",background:C.bgDark,color:SKILL_COLORS[t]||C.grey,fontFamily:BF,fontSize:"11px",border:`1px solid ${(SKILL_COLORS[t]||C.grey)}44`,whiteSpace:"nowrap"}},t))
  );
}

        React.createElement('div',{style:{fontFamily:BF,fontSize:"13px",color:(p.cls&&p.cls.ptype)==="behavioral"?C.green:C.blue,marginBottom:"4px"}},(p.cls&&p.cls.ptype)==="behavioral"?"🟢 ALWAYS ACTIVE":"🔵 TRIGGERED"),

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("codex");
  const [docSec,setDocSec]=useState(null);

  const _loadPlayers=()=>{
    try{const raw=localStorage.getItem("dgd_players");if(raw){const saved=JSON.parse(raw);return saved.map(p=>({...p,cls:CLASSES.find(c=>c.name===p.clsName)||null}));}}catch(e){}
    return [];
  };
  const [allPlayers,setAllPlayers]=useState(_loadPlayers);
  const [editIdx,setEditIdx]=useState(null);
  const [eName,setEName]=useState("");
  const [eCls,setECls]=useState(null);
  const [classDetail,setClassDetail]=useState(null);
  const [partyView,setPartyView]=useState("list");
  const [sheetPlayerId,setSheetPlayerId]=useState(null);
  const [expandedTreasure,setExpandedTreasure]=useState(null);

  const _loadQuests=()=>{try{const r=localStorage.getItem("dgd_quests");return r?JSON.parse(r):[];}catch(e){return[];}};
  const _loadActiveQuestId=()=>{try{const r=localStorage.getItem("dgd_activeQuestId");return r?JSON.parse(r):null;}catch(e){return null;}};
  const [quests,setQuests]=useState(_loadQuests);
  const [activeQuestId,setActiveQuestId]=useState(_loadActiveQuestId);
  const [questView,setQuestView]=useState("manager");
  const [questPlayerIds,setQuestPlayerIds]=useState([]);

  const [aD,setAD]=useState([]);
  const [bD,setBD]=useState([]);
  const [pD,setPD]=useState([]);
  const [bhD,setBhD]=useState([]);
  const [tD,setTD]=useState([]);

  const [card,setCard]=useState(null);
  const [activeAdventureCard,setActiveAdventureCard]=useState(null);
  const [scorecardQuestId,setScorecardQuestId]=useState(null);
  const [cardDeck,setCardDeck]=useState(null);
  const [cardPhase,setCardPhase]=useState("read");
  const [cardMeta,setCardMeta]=useState({});
  const [sheetId,setSheetId]=useState(null);
  const [drawQueue,setDrawQueue]=useState([]);
  const [holeScores,setHoleScores]=useState({});
  // Lingering quest-level boons (green banners, like perils but positive)
  // e.g. {id, title, effect} — free redraw token from Coded Message
  const [questBoons,setQuestBoons]=useState([]);

  // ── Save helpers ──────────────────────────────────────────────────────────
  const _savePlayers=(ps)=>{
    try{const toSave=ps.map(p=>({...p,clsName:p.cls?p.cls.name:null,cls:undefined}));localStorage.setItem("dgd_players",JSON.stringify(toSave));}catch(e){}
  };
  const _setAndSavePlayers=(updater)=>{
    setAllPlayers(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      try{const toSave=next.map(p=>({...p,clsName:p.cls?p.cls.name:null,cls:undefined}));localStorage.setItem("dgd_players",JSON.stringify(toSave));}catch(e){}
      return next;
    });
  };
  const _setAndSaveQuests=(updater)=>{
    setQuests(prev=>{const next=typeof updater==="function"?updater(prev):updater;try{localStorage.setItem("dgd_quests",JSON.stringify(next));}catch(e){}return next;});
  };
  const _setAndSaveActiveQuestId=(id)=>{setActiveQuestId(id);try{localStorage.setItem("dgd_activeQuestId",JSON.stringify(id));}catch(e){}};

  const activeQuest=quests.find(q=>q.id===activeQuestId)||null;
  const hole=(activeQuest&&activeQuest.hole)||1;
  const perils=(activeQuest&&activeQuest.perils)||[];
  const questPlayersFromQuest=allPlayers.filter(p=>((activeQuest&&activeQuest.playerIds)||[]).includes(p.id));
  const questPlayers=questView==="play"?questPlayersFromQuest:allPlayers.filter(p=>questPlayerIds.includes(p.id));

  const adj=(pid,f,d)=>_setAndSavePlayers(ps=>ps.map(p=>p.id===pid?{...p,[f]:Math.max(0,p[f]+d)}:p));

  // ── Props passed into CardOverlay (fixes crashes) ─────────────────────────
  const drawBoon=()=>{let d=bD.length?bD:shuffle(BOON_CARDS);if(!bD.length)setBD(d);const c=d[0];setBD(d.slice(1));return c;};
  const drawPeril=()=>{let d=pD.length?pD:shuffle(PERIL_CARDS);if(!pD.length)setPD(d);const c=d[0];setPD(d.slice(1));return c;};
  const applyGoldToAll=(amount)=>_setAndSavePlayers(ps=>ps.map(p=>questPlayersFromQuest.find(q=>q.id===p.id)?{...p,gold:Math.max(0,p.gold+amount)}:p));
  const applyGoldToPlayer=(pid,amount)=>_setAndSavePlayers(ps=>ps.map(p=>p.id===pid?{...p,gold:Math.max(0,p.gold+amount)}:p));
  const applyTokensToAll=(amount)=>_setAndSavePlayers(ps=>ps.map(p=>questPlayersFromQuest.find(q=>q.id===p.id)?{...p,tokens:p.tokens+amount}:p));
  const setPlayerField=(pid,field,val)=>_setAndSavePlayers(ps=>ps.map(p=>p.id===pid?{...p,[field]:val}:p));
  const updateQuestPerils=(p)=>_setAndSaveQuests(qs=>qs.map(q=>q.id===activeQuestId?{...q,perils:p}:q));
  const updateQuestHole=(h)=>_setAndSaveQuests(qs=>qs.map(q=>q.id===activeQuestId?{...q,hole:h}:q));

  function addPlayer(){
    if(allPlayers.length>=8)return;
    const p={id:Date.now(),name:"",cls:null,gold:0,xp:0,tokens:1,tee:"white",level:1,notes:"",treasures:[],chosenSkills:[],gear:[],scoreHistory:[]};
    _setAndSavePlayers(prev=>[...prev,p]);setEditIdx(allPlayers.length);setEName("");setECls(null);setPartyView("newchar");
  }
  function savePlayer(){
    if(editIdx===null)return;
    const cls=eCls!==null?CLASSES[eCls]:null;
    const startGear=cls?cls.gear.split(/[,+]/).map(s=>s.trim()).filter(Boolean):[];
    _setAndSavePlayers(p=>{const n=[...p];n[editIdx]={...n[editIdx],name:eName,cls,gear:startGear};return n;});
    setEditIdx(null);setPartyView("list");
  }
  function updatePlayerField(pid,field,val){_setAndSavePlayers(ps=>ps.map(p=>p.id===pid?{...p,[field]:val}:p));}
  function levelUp(pid){
    _setAndSavePlayers(ps=>ps.map(p=>{
      if(p.id!==pid)return p;
      const need=p.level===1?8:p.level===2?9:99;
      if(p.xp<need)return p;
      return{...p,level:p.level+1,xp:p.xp-need,tokens:p.tokens+1};
    }));
  }
  function createQuest(){
    const id=Date.now();
    const nq={id,playerIds:[...questPlayerIds],hole:1,perils:[],
      aDeck:shuffle(ADVENTURE_CARDS),bDeck:shuffle(BOON_CARDS),pDeck:shuffle(PERIL_CARDS),
      bhDeck:shuffle(BETWEEN_CARDS),tDeck:shuffle(TREASURE_CARDS),
      roundScore:0,startDate:new Date().toLocaleDateString(),
      questBoons:[],nextAdventureCard:null};
    _setAndSaveQuests(qs=>[...qs,nq]);
    _setAndSavePlayers(ps=>ps.map(p=>questPlayerIds.includes(p.id)?{...p,tee:"white",gold:0,xp:0,tokens:1,level:1}:p));
    _setAndSaveActiveQuestId(nq.id);
    setAD(nq.aDeck);setBD(nq.bDeck);setPD(nq.pDeck);setBhD(nq.bhDeck);setTD(nq.tDeck);
    setQuestBoons([]);
    setDrawQueue([]);setCard(null);setCardDeck(null);setActiveAdventureCard(null);setQuestView("play");
  }
  function resumeQuest(q){
    _setAndSaveActiveQuestId(q.id);
    setAD(q.aDeck);setBD(q.bDeck);setPD(q.pDeck);setBhD(q.bhDeck);setTD(q.tDeck);
    setQuestBoons(q.questBoons||[]);
    setDrawQueue([]);setCard(null);setCardDeck(null);setActiveAdventureCard(null);setQuestView("play");
  }
  function deleteQuest(qid){_setAndSaveQuests(qs=>qs.filter(q=>q.id!==qid));if(activeQuestId===qid){_setAndSaveActiveQuestId(null);setQuestView("manager");}}
  function backToManager(){
    _setAndSaveQuests(qs=>qs.map(q=>q.id===activeQuestId?{...q,hole,perils,aDeck:aD,bDeck:bD,pDeck:pD,bhDeck:bhD,tDeck:tD,questBoons}:q));
    setQuestView("manager");
  }

  function draw(dk,setDk,src){let d=dk.length?dk:shuffle(src);if(!dk.length)setDk(d);const c=d[0];setDk(d.slice(1));return c;}

  function tapDeck(type){
    if(type==="adventure"){
      if(activeAdventureCard){
        setCard(activeAdventureCard.card);
        setCardDeck(activeAdventureCard.isConsequence?"consequence":"adventure");
        setCardMeta(activeAdventureCard.meta||{});
        setCardPhase("score");
        setHoleScores(activeAdventureCard.scores||{});
        return;
      }
      // Check if there's a queued consequence card for this hole
      const nextCard=activeQuest&&activeQuest.nextAdventureCard;
      let c;
      let isConsequence=false;
      if(nextCard){
        c=nextCard;
        isConsequence=true;
        // Clear the queued consequence
        _setAndSaveQuests(qs=>qs.map(q=>q.id===activeQuestId?{...q,nextAdventureCard:null}:q));
      } else {
        c=draw(aD,setAD,ADVENTURE_CARDS);
      }
      const init={};
      questPlayersFromQuest.forEach(p=>{init[p.id]=0;});
      setHoleScores(init);
      setActiveAdventureCard({card:c,meta:{},scores:init,isConsequence});
      setCard(c);setCardDeck(isConsequence?"consequence":"adventure");setCardMeta({});setCardPhase("score");
      return;
    }
    let c;
    if(type==="boon")c=draw(bD,setBD,BOON_CARDS);
    else if(type==="peril")c=draw(pD,setPD,PERIL_CARDS);
    else if(type==="between")c=draw(bhD,setBhD,BETWEEN_CARDS);
    else c=draw(tD,setTD,TREASURE_CARDS);
    setCard(c);setCardDeck(type);setCardMeta({});setCardPhase("read");
  }

  function cardAction(act,pid){
    if(act==="success"||act==="fail"){
      const text=act==="success"?card.success:card.fail;
      const gm=text&&text.match(/[Gg]ain\s+(\d+)\s*gp/);
      const lm=text&&text.match(/loses?\s+(\d+)\s*gp/i);
      const xm=text&&text.match(/[Gg]ain\s+(\d+)\s*XP/i);
      const t=card.title;
      const m=cardMeta;

      // ── Per-card reward logic ──────────────────────────────────────────────
      if(t==="The Wounded Traveler"&&act==="success"){
        if(m.stopped) applyGoldToAll(2);
      } else if(t==="The Toll Keeper"){
        if(m.paid) applyGoldToAll(-2);
        if(act==="success"){
          applyGoldToAll(3);
        } else {
          if(!m.paid&&card.consequenceOnFail){
            _setAndSaveQuests(qs=>qs.map(q=>q.id===activeQuestId?{...q,nextAdventureCard:card.consequenceOnFail}:q));
          }
        }
      } else if(t==="The Wounded Traveler"&&act==="fail"){
        // XP for everyone
        questPlayersFromQuest.forEach(p=>adj(p.id,"xp",1));
        // If pressed on: add lingering peril condition for next Social hole
        if(m.stopped===false){
          updateQuestPerils([...perils,{card:{title:"Cursed Passage",effect:"You pressed on when someone needed help. Next Social hole all throws with disadvantage.",xp:0,scope:"Party"},pid:null,pname:"Party (pressed on)"}]);
        }
      } else if(t==="The Banquet"){
        if(act==="success"){
          const total=Object.values(m.banquetSpend||{}).reduce((a,v)=>a+v,0);
          const payout=total>=6?10:total>=3?6:3;
          questPlayersFromQuest.forEach(p=>{
            const spent=(m.banquetSpend&&m.banquetSpend[p.id])||0;
            applyGoldToPlayer(p.id,payout);
          });
          if(total>=6){const tc=draw(tD,setTD,TREASURE_CARDS);setCard(tc);setCardDeck("treasure");setCardPhase("read");setActiveAdventureCard(null);return;}
          if(card.consequenceOnFail&&act==="fail"){
            _setAndSaveQuests(qs=>qs.map(q=>q.id===activeQuestId?{...q,nextAdventureCard:card.consequenceOnFail}:q));
          }
        } else {
          questPlayersFromQuest.forEach(p=>{
            const spent=(m.banquetSpend&&m.banquetSpend[p.id])||0;
            if(spent>0) applyGoldToPlayer(p.id,-spent);
          });
          if(card.consequenceOnFail){
            _setAndSaveQuests(qs=>qs.map(q=>q.id===activeQuestId?{...q,nextAdventureCard:card.consequenceOnFail}:q));
          }
        }
      } else if(t==="The Wager"){
        questPlayersFromQuest.forEach(p=>{
          const w=(m.wager&&m.wager[p.id])||0;
          if(w===0)return;
          if(act==="success"){applyGoldToPlayer(p.id,w);}
          else{applyGoldToPlayer(p.id,-w);}
        });
        if(gm) applyGoldToAll(parseInt(gm[1]));
      } else if(t==="The Hermit"){
        if(act==="success"&&gm) applyGoldToAll(parseInt(gm[1]));
      } else if(t==="The Standing Stones"){
        if(act==="success"&&gm) applyGoldToAll(parseInt(gm[1]));
      } else if(t==="The Offering Stone"){
        const offerers=Object.keys(m.offering||{}).filter(id=>m.offering[id]);
        if(offerers.length>=2&&act==="success"){
          offerers.forEach(id=>applyGoldToPlayer(parseInt(id),1));
        }
        if(act==="success"&&gm) applyGoldToAll(parseInt(gm[1]));
      } else if(t==="The River Crossing"){
        const riverGp=act==="success"?3:1;
        applyGoldToAll(riverGp);
      } else if(t==="The Wrong Path"){
        if(act==="success"&&gm) applyGoldToAll(parseInt(gm[1]));
        if(act==="fail"&&m.wrongPathPeril){
          const pc=m.wrongPathPeril;
          const wpid=m.wrongPathPid;
          const pname=m.wrongPathPname||"?";
          if(pc.xp>0&&wpid) adj(wpid,"xp",pc.xp);
          if(pc.scope==="Party"){
            const plm=(pc.effect||"").match(/loses?\s+(\d+)\s*gp/i);
            if(plm){const n=parseInt(plm[1]);applyGoldToAll(-n);}
            else updateQuestPerils([...perils,{card:pc,pid:null,pname:"Party"}]);
          } else {
            updateQuestPerils([...perils,{card:pc,pid:wpid,pname}]);
          }
        }
      } else if(t==="The Challenge"){
        if(act==="success"){
          const heroic=m.challengeStake==="heroic";
          applyGoldToAll(heroic?5:3);
          if(heroic){const bc=draw(bD,setBD,BOON_CARDS);setCard(bc);setCardDeck("boon");setCardPhase("read");setActiveAdventureCard(null);return;}
        }
      } else if(t==="The Coded Message"){
        if(act==="success"){
          if(gm) applyGoldToAll(parseInt(gm[1]));
          // Grant a free redraw lingering boon
          const newBoon={id:Date.now(),title:"Free Redraw",effect:"Coded Message reward — use to redraw any Adventure, Boon, or Peril card once this round.",color:C.green};
          setQuestBoons(prev=>[...prev,newBoon]);
          _setAndSaveQuests(qs=>qs.map(q=>q.id===activeQuestId?{...q,questBoons:[...(q.questBoons||[]),newBoon]}:q));
        } else {
          if(gm) applyGoldToAll(-parseInt(gm[1]));
          if(card.consequenceOnFail){
            _setAndSaveQuests(qs=>qs.map(q=>q.id===activeQuestId?{...q,nextAdventureCard:card.consequenceOnFail}:q));
          }
        }
      } else {
        // Default: apply gp/loss/xp + check for consequence card
        if(gm) applyGoldToAll(parseInt(gm[1]));
        if(lm) applyGoldToAll(-parseInt(lm[1]));
        if(xm) questPlayersFromQuest.forEach(p=>adj(p.id,"xp",parseInt(xm[1])));
        if(act==="fail"&&card.consequenceOnFail){
          _setAndSaveQuests(qs=>qs.map(q=>q.id===activeQuestId?{...q,nextAdventureCard:card.consequenceOnFail}:q));
        }
        if(act==="success"&&card.consequenceOnSuccess){
          _setAndSaveQuests(qs=>qs.map(q=>q.id===activeQuestId?{...q,nextAdventureCard:card.consequenceOnSuccess}:q));
        }
      }

      // Build draw queue from hole scores
      const queue=[];
      questPlayersFromQuest.forEach(p=>{
        const n=holeScores[p.id]||0;
        const newTee=n<0?"blue":n===0?"white":"red";
        _setAndSavePlayers(ps=>ps.map(pl=>{
          if(pl.id!==p.id)return pl;
          const hist=[...(pl.scoreHistory||[])];
          const qi=hist.findIndex(r=>r.questId===activeQuestId);
          if(qi>=0){const holes=[...hist[qi].holes,{hole,score:n}];const total=holes.reduce((a,h)=>a+h.score,0);hist[qi]={...hist[qi],holes,total};}
          else{hist.push({questId:activeQuestId,date:new Date().toLocaleDateString(),holes:[{hole,score:n}],total:n});}
          return{...pl,tee:newTee,scoreHistory:hist};
        }));
        if(n<0)queue.push({pid:p.id,pname:p.name,type:"boon"});
        if(n>0)queue.push({pid:p.id,pname:p.name,type:"peril"});
      });

      const holeTotal=Object.values(holeScores).reduce((a,v)=>a+(v||0),0);
      const nh=Math.min(18,hole+1);
      _setAndSaveQuests(qs=>qs.map(q=>q.id===activeQuestId?{...q,roundScore:(q.roundScore||0)+holeTotal,hole:nh,perils,aDeck:aD,bDeck:bD,pDeck:pD,bhDeck:bhD,tDeck:tD}:q));
      updateQuestHole(nh);
      setActiveAdventureCard(null);
      setCard(null);setCardDeck(null);
      setDrawQueue(queue);
      return;
    }

    if(act==="adjustPlayer"&&pid!==undefined){setSheetId(pid);return;}

    if(act==="assign"&&pid!==undefined){
      const text=(card.effect||"")+" "+(card.reward||"");
      const gm=text.match(/[Gg]ain\s+(\d+)\s*gp/);
      const lm=text.match(/loses?\s+(\d+)\s*gp/i);
      const xm=text.match(/[Gg]ain\s+(\d+)\s*XP/i);
      const t1=text.match(/[Gg]ain\s+a\s+(stored\s+)?advantage token/i);
      const tm=text.match(/[Gg]ain\s+(\d+)\s*(stored\s+)?advantage token/i);
      const drawTreasure=/[Dd]raw\s+a\s+treasure/i.test(text);
      const drawBoonFlag=/[Dd]raw\s+(one\s+additional|a)\s+[Bb]oon/i.test(text);
      if(gm) adj(pid,"gold",parseInt(gm[1]));
      if(lm) adj(pid,"gold",-parseInt(lm[1]));
      if(xm) adj(pid,"xp",parseInt(xm[1]));
      if(card.xp>0) adj(pid,"xp",card.xp);
      if(t1) adj(pid,"tokens",1);
      else if(tm) adj(pid,"tokens",parseInt(tm[1]));
      if(cardDeck==="peril"&&card.effect) updateQuestPerils([...perils,{card,pid,pname:(allPlayers.find(p=>p.id===pid)||{name:"?"}).name}]);
      if(drawTreasure){const tc=draw(tD,setTD,TREASURE_CARDS);setCard(tc);setCardDeck("treasure");setCardPhase("read");return;}
      if(drawBoonFlag){const bc=draw(bD,setBD,BOON_CARDS);setCard(bc);setCardDeck("boon");setCardPhase("read");return;}
      setCard(null);setCardDeck(null);
      return;
    }
    if(act==="assignBetween"&&pid!==undefined){
      adj(pid,"gold",1);
      adj(pid,"xp",1);
      return;
    }
    if(act==="applyPartyPeril"){
      const text=(card.effect||"");
      const lm=text.match(/loses?\s+(\d+)\s*gp/i);
      if(lm){const n=parseInt(lm[1]);applyGoldToAll(-n);}
      if(card.effect&&!lm) updateQuestPerils([...perils,{card,pid:null,pname:"Party"}]);
      setCard(null);setCardDeck(null);
      return;
    }
    if(act==="assignTreasure"&&pid!==undefined){
      _setAndSavePlayers(ps=>ps.map(p=>p.id===pid?{...p,treasures:[...(p.treasures||[]),card]}:p));
      setCard(null);setCardDeck(null);
      return;
    }
  }

            _setAndSaveQuests(qs=>qs.map(q=>q.id===activeQuestId?{...q,hole:nh,perils,aDeck:aD,bDeck:bD,pDeck:pD,bhDeck:bhD,tDeck:tD}:q));
            updateQuestHole(nh);
          },style:{width:"100%",padding:"13px 0",background:C.bgDark,border:`4px solid ${hole===9?C.cyan:hole>=18?C.gold:C.borderBright}`,borderRadius:0,color:hole===9?C.cyan:hole>=18?C.gold:C.whiteDim,fontFamily:BF,fontSize:"13px",cursor:"pointer",letterSpacing:1,boxShadow:bevel(hole===9?C.cyan:hole>=18?C.gold:C.borderBright)}},
            hole===9?"⛺ CAMP — ADVANCE TO HOLE 10":hole>=18?"🏆 FINISH QUEST":"SKIP TO HOLE "+(hole+1)+" →"
          )
        ),

        // Party strip — horizontal 2-column layout
        React.createElement('div',{style:{position:"fixed",bottom:70,left:0,right:0,maxWidth:480,margin:"0 auto",background:C.bgDark,borderTop:`4px solid ${C.borderBright}`,padding:"5px 6px",zIndex:850}},
          React.createElement('div',{style:{display:"grid",gridTemplateColumns:`repeat(${Math.min(questPlayers.length,2)},1fr)`,gap:"4px"}},
            questPlayers.map(p=>(
              React.createElement('button',{key:p.id,onClick:()=>setSheetId(p.id),style:{padding:"6px 10px",background:C.bgCard,border:`3px solid ${(p.cls&&p.cls.color)||C.borderBright}`,borderRadius:0,cursor:"pointer",display:"flex",alignItems:"center",gap:"8px",boxShadow:bevel((p.cls&&p.cls.color)||C.borderBright)}},
                React.createElement('div',{style:{fontSize:"18px",flexShrink:0}},(p.cls&&p.cls.icon)||"❓"),
                React.createElement('div',{style:{flex:1,minWidth:0}},
                  React.createElement('div',{style:{fontFamily:BF,fontSize:"12px",color:(p.cls&&p.cls.color)||C.gold,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},p.name),
                  React.createElement('div',{style:{display:"flex",gap:"6px",flexWrap:"wrap"}},
                    React.createElement('span',{style:{fontFamily:BF,fontSize:"11px",color:C.gold}},"💰",p.gold),
                    React.createElement('span',{style:{fontFamily:BF,fontSize:"11px",color:C.purple}},"✦",p.xp),
                    React.createElement('span',{style:{fontFamily:BF,fontSize:"11px",color:C.cyan}},"🛡",p.tokens)
                  )
                ),
                React.createElement('div',{style:{width:10,height:10,background:TEE[p.tee],border:`1px solid ${C.borderBright}`,flexShrink:0}})
              )
            ))
          )
        )
      )
    ),

    // ── TAB BAR ──────────────────────────────────────────────────────────────
    React.createElement('div',{style:{position:"fixed",bottom:0,left:0,right:0,background:C.bgDark,borderTop:`4px solid ${C.borderBright}`,display:"flex",zIndex:900,maxWidth:480,margin:"0 auto",height:70,alignItems:"stretch",padding:"6px 6px 4px",gap:"4px"}},
      [{id:"codex",icon:"📜",label:"CODEX",glow:false},{id:"party",icon:"👥",label:"PARTY",glow:allPlayers.length===0&&tab!=="party"},{id:"adventure",icon:"⚔️",label:"QUEST",glow:allPlayers.length>0&&quests.length===0&&tab!=="adventure"}].map(t=>(
        React.createElement('button',{key:t.id,onClick:()=>setTab(t.id),style:{
          flex:1,cursor:"pointer",textAlign:"center",
          background:tab===t.id?C.gold:C.bgCard,
          border:`4px solid ${tab===t.id?C.gold:t.glow?C.gold:C.borderBright}`,
          borderRadius:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"2px",
          boxShadow:tab===t.id?bevelBtn(C.gold):bevel(C.borderBright),
          animation:t.glow&&tab!==t.id?"pulse 2s infinite":"none",
        }},
          React.createElement('div',{style:{fontSize:"18px"}},t.icon),
          React.createElement('div',{style:{fontFamily:BF,fontSize:"13px",letterSpacing:1,color:tab===t.id?C.bgDark:t.glow?C.gold:C.whiteDim}},t.label)
        )
      ))
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App, null));
</script>
</body>
</html>
